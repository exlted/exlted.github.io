### your site title here

title: Ben King
description: games | simulations | software

baseurl: "/"
url: "https://exlted.github.io"
email: contact@exlted.com#

# Pagination
paginate: 4
permalink: /blog/:year/:title/
paginate_path: /blog/page:num/

# Social media links in footer
# twitter: "#"
linkedin: "ben-king-gaming"
# stackoverflow: "#"
github: "exlted"
# researchgate: "#"
# orcid: "#"
# quora: "#"
# instagram: "#"
# facebook: "#"


# Markdown
highlighter: rouge
markdown: kramdown

# Tracker
analytics:

# optimization -> compress.html
compress_html:
  clippings: [html,div, p, ul, td, h1, h2, h3, h4,link, meta, footer, nav, img, header, hr, br, head, style, li, ul, ol, time, main, script, title]
  comments: ["<!-- ", " -->"]
  endings: [all]
  ignore:
    envs: [local]
  blanklines: false
  profile: false
  startings: []

#collection
collections:
  projects:
    output: true
    permalink: /projects/:name/
    order:
      - SimpleMenuSystem.md
      - Unreal_RTS_Toolkit.md
      - Samurai_Warriors.md
      - Godot_Voice.md
      - StreamCore.md
      - Unity_Character_Controller.md
      - Game_Of_Life.md
      - Graphics_2_Rendering_Engine.md

sass:
  sass_dir: /assets/css/_sass
  style: compressed

include:
  - _pages

exclude:
  - README.md
  - LICENSE.md

plugins:
  - jekyll-seo-tag
  - jekyll-paginate
  - jekyll-email-protect
  - jekyll-target-blank
